services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: udpxy-backend
    ports:
      - "7860:7860"
    volumes:
      - ./data:/app/data
    environment:
      - UDPXY_SCANNER_PASSWORD=admin
    restart: unless-stopped

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: udpxy-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
